name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # OIDC token for npm trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7

    - name: Enable Corepack
      run: corepack enable

    - name: Use Node.js 24.x
      uses: actions/setup-node@v7
      with:
        node-version: 24.x
        cache: 'yarn'

    - name: Install dependencies
      run: yarn install --immutable

    - name: Run tests
      run: yarn test

    - name: Check tag matches package.json version
      run: |
        TAG="${{ github.event.release.tag_name }}"
        TAG_VERSION="${TAG#v}"
        PKG_VERSION="$(node -p "require('./package.json').version")"
        if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
          echo "Release tag ($TAG_VERSION) does not match package.json version ($PKG_VERSION)" >&2
          exit 1
        fi

    - name: Build
      run: yarn build

    # Trusted publishing (OIDC) needs npm >= 11.5.1; provenance is generated automatically.
    - name: Update npm
      run: npm install -g npm@latest

    - name: Publish
      run: |
        PKG_VERSION="$(node -p "require('./package.json').version")"
        case "$PKG_VERSION" in
          *-*) DIST_TAG=beta ;;
          *)   DIST_TAG=latest ;;
        esac
        echo "Publishing $PKG_VERSION with dist-tag $DIST_TAG"
        npm publish --tag "$DIST_TAG"
